<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #18181b;
    --surface2: #222226;
    --border: #2e2e34;
    --text: #f0eff4;
    --muted: #8884a0;
    --accent: #a78bfa;
    --accent2: #7c3aed;
    --green: #4ade80;
    --red: #f87171;
    --blue: #60a5fa;
    --font-sans: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container { max-width: 680px; margin: 0 auto; }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 2.5rem;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .date {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* Account cards */
  .accounts {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 2rem;
  }

  .acct {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.1rem;
    position: relative;
    overflow: hidden;
  }

  .acct::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.4;
  }

  .acct.bezny::before { background: var(--blue); }
  .acct.sporak::before { background: var(--green); }
  .acct.penzijko::before { background: var(--accent); }
  .acct.petska::before { background: #fb923c; }

  .acct-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .acct-value {
    font-family: var(--font-mono);
    font-size: 1.35rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }

  .acct-value.negative { color: var(--red); }

  .total-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
  }

  .total-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .total-value {
    font-family: var(--font-mono);
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--accent);
  }

  /* Form */
  .form-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .section-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .row { display: grid; gap: 10px; margin-bottom: 10px; }
  .row.two { grid-template-columns: 1fr 1fr; }
  .row.three { grid-template-columns: 1fr 1fr 1fr; }

  .field label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  input, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 0.9rem;
    padding: 0.6rem 0.8rem;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  input::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--font-sans);
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.7rem;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 4px;
  }

  .btn:hover { background: var(--accent); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .err {
    font-size: 0.8rem;
    color: var(--red);
    margin-top: 8px;
    display: none;
  }

  /* History */
  .history-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
  }

  .tx-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }

  .tx-row:last-child { border-bottom: none; }

  .tx-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    flex-shrink: 0;
  }

  .tx-icon.prijem { background: rgba(74,222,128,0.12); color: var(--green); }
  .tx-icon.vydaj { background: rgba(248,113,113,0.12); color: var(--red); }
  .tx-icon.prevod { background: rgba(96,165,250,0.12); color: var(--blue); }

  .tx-name { flex: 1; color: var(--text); font-weight: 500; }
  .tx-meta { font-size: 0.72rem; color: var(--muted); }

  .tx-amount {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    font-weight: 500;
  }

  .tx-amount.prijem { color: var(--green); }
  .tx-amount.vydaj { color: var(--red); }
  .tx-amount.prevod { color: var(--blue); }

  .tx-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.1s;
    line-height: 1;
  }

  .tx-delete:hover { color: var(--red); }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 2rem 0;
    font-family: var(--font-mono);
  }

  .loading {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 1.5rem 0;
    font-family: var(--font-mono);
  }

  @media (max-width: 480px) {
    .accounts { grid-template-columns: 1fr 1fr; }
    .row.three { grid-template-columns: 1fr 1fr; }
    .row.three .field:last-child { grid-column: span 2; }
    h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>💸 Finance</h1>
    <span class="date" id="todayDate"></span>
  </header>

  <div class="accounts">
    <div class="acct bezny">
      <p class="acct-label">Běžný účet</p>
      <p class="acct-value" id="val-bezny">—</p>
    </div>
    <div class="acct sporak">
      <p class="acct-label">Spořící účet</p>
      <p class="acct-value" id="val-sporak">—</p>
    </div>
    <div class="acct penzijko">
      <p class="acct-label">Penzijko</p>
      <p class="acct-value" id="val-penzijko">—</p>
    </div>
    <div class="acct petska">
      <p class="acct-label">Petska firemní</p>
      <p class="acct-value" id="val-petska">—</p>
    </div>
  </div>

  <div class="total-bar">
    <span class="total-label">Celkem</span>
    <span class="total-value" id="totalAll">—</span>
  </div>

  <div class="form-section">
    <p class="section-title">Nová transakce</p>
    <div class="row two">
      <div class="field">
        <label>Název</label>
        <input type="text" id="txName" placeholder="např. Plat Wolt" />
      </div>
      <div class="field">
        <label>Částka (Kč)</label>
        <input type="number" id="txAmount" placeholder="0" min="1" />
      </div>
    </div>
    <div class="row three">
      <div class="field">
        <label>Účet</label>
        <select id="txAccount">
          <option value="bezny">Běžný účet</option>
          <option value="sporak">Spořící účet</option>
          <option value="penzijko">Penzijko</option>
          <option value="petska">Petska firemní</option>
        </select>
      </div>
      <div class="field">
        <label>Typ</label>
        <select id="txType" onchange="toggleToAccount()">
          <option value="prijem">Příjem</option>
          <option value="vydaj">Výdaj</option>
          <option value="prevod">Převod</option>
        </select>
      </div>
      <div class="field" id="toAccountField" style="display:none;">
        <label>Na účet</label>
        <select id="txToAccount">
          <option value="bezny">Běžný účet</option>
          <option value="sporak">Spořící účet</option>
          <option value="penzijko">Penzijko</option>
          <option value="petska">Petska firemní</option>
        </select>
      </div>
    </div>
    <button class="btn" id="addBtn" onclick="addTransaction()">Přidat transakci</button>
    <p class="err" id="errMsg"></p>
  </div>

  <div class="history-section">
    <p class="section-title">Historie</p>
    <div id="historyList"><p class="loading">Načítám...</p></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://eaiwhttmuubzenlpsfad.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhaXdodHRtdXViemVubHBzZmFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTQ5OTksImV4cCI6MjA5Mzk5MDk5OX0.wpq1aUciLu6njaIU5-bOzZ5sVhz_q6Rg4ZbnjUWnWsk';

const DEFAULTS = { bezny: 24069, sporak: 35327, penzijko: 13414, petska: 12245 };
const LABELS = { bezny: 'Běžný účet', sporak: 'Spořící účet', penzijko: 'Penzijko', petska: 'Petska firemní' };
const ICONS = { prijem: '↓', vydaj: '↑', prevod: '⇄' };

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let transactions = [];

function fmt(n) {
  return Math.round(n).toLocaleString('cs-CZ') + ' Kč';
}

function calcBalances() {
  const b = { ...DEFAULTS };
  for (const tx of transactions) {
    if (tx.type === 'prijem') {
      b[tx.account] += tx.amount;
    } else if (tx.type === 'vydaj') {
      b[tx.account] -= tx.amount;
    } else if (tx.type === 'prevod') {
      b[tx.account] -= tx.amount;
      if (tx.to_account) b[tx.to_account] += tx.amount;
    }
  }
  return b;
}

function render() {
  const b = calcBalances();
  for (const key of Object.keys(DEFAULTS)) {
    const el = document.getElementById('val-' + key);
    el.textContent = fmt(b[key]);
    el.className = 'acct-value' + (b[key] < 0 ? ' negative' : '');
  }
  const total = Object.values(b).reduce((a, c) => a + c, 0);
  document.getElementById('totalAll').textContent = fmt(total);

  const list = document.getElementById('historyList');
  if (!transactions.length) {
    list.innerHTML = '<p class="empty">Žádné transakce</p>';
    return;
  }

  list.innerHTML = [...transactions].reverse().map(tx => {
    const meta = tx.type === 'prevod'
      ? `${LABELS[tx.account]} → ${LABELS[tx.to_account]}`
      : LABELS[tx.account];
    const sign = tx.type === 'prijem' ? '+' : tx.type === 'vydaj' ? '−' : '';
    const dateStr = new Date(tx.created_at).toLocaleDateString('cs-CZ', { day: 'numeric', month: 'short' });
    return `<div class="tx-row">
      <div class="tx-icon ${tx.type}">${ICONS[tx.type]}</div>
      <div style="flex:1; min-width:0;">
        <div class="tx-name">${tx.name}</div>
        <div class="tx-meta">${meta} · ${dateStr}</div>
      </div>
      <span class="tx-amount ${tx.type}">${sign}${fmt(tx.amount)}</span>
      <button class="tx-delete" onclick="deleteTransaction('${tx.id}')" title="Smazat">×</button>
    </div>`;
  }).join('');
}

async function loadTransactions() {
  const { data, error } = await db.from('transactions').select('*').order('created_at', { ascending: true });
  if (!error && data) {
    transactions = data;
    render();
  } else {
    document.getElementById('historyList').innerHTML = '<p class="empty">Chyba při načítání.</p>';
  }
}

async function addTransaction() {
  const name = document.getElementById('txName').value.trim();
  const amount = parseFloat(document.getElementById('txAmount').value);
  const account = document.getElementById('txAccount').value;
  const type = document.getElementById('txType').value;
  const to_account = document.getElementById('txToAccount').value;
  const err = document.getElementById('errMsg');
  const btn = document.getElementById('addBtn');

  err.style.display = 'none';
  if (!name) { showErr('Zadej název.'); return; }
  if (!amount || amount <= 0) { showErr('Zadej kladnou částku.'); return; }
  if (type === 'prevod' && account === to_account) { showErr('Zdrojový a cílový účet musí být různé.'); return; }

  btn.disabled = true;
  btn.textContent = 'Ukládám...';

  const payload = { name, amount, account, type, to_account: type === 'prevod' ? to_account : null };
  const { data, error } = await db.from('transactions').insert([payload]).select();

  btn.disabled = false;
  btn.textContent = 'Přidat transakci';

  if (error) { showErr('Chyba při ukládání: ' + error.message); return; }

  transactions.push(data[0]);
  render();
  document.getElementById('txName').value = '';
  document.getElementById('txAmount').value = '';
}

async function deleteTransaction(id) {
  if (!confirm('Smazat tuto transakci?')) return;
  const { error } = await db.from('transactions').delete().eq('id', id);
  if (!error) {
    transactions = transactions.filter(t => t.id !== id);
    render();
  }
}

function showErr(msg) {
  const e = document.getElementById('errMsg');
  e.textContent = msg;
  e.style.display = 'block';
}

function toggleToAccount() {
  const type = document.getElementById('txType').value;
  document.getElementById('toAccountField').style.display = type === 'prevod' ? 'block' : 'none';
}

document.getElementById('todayDate').textContent = new Date().toLocaleDateString('cs-CZ', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

loadTransactions();
</script>
</body>
</html>
